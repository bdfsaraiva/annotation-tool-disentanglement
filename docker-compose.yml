services:
  backend:
    build: ./annotation-backend
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      - DATABASE_URL=${DATABASE_URL}
      - SECRET_KEY=${SECRET_KEY}
      - FIRST_ADMIN_USERNAME=${FIRST_ADMIN_USERNAME}
      - FIRST_ADMIN_PASSWORD=${FIRST_ADMIN_PASSWORD}
      - CORS_ORIGINS=${CORS_ORIGINS}
    volumes:
      - ./annotation-backend:/app
      - ./data:/app/data

  frontend:
    build: ./annotation_ui
    ports:
      - "3721:3721"
    environment:
      - VITE_API_URL=${VITE_API_URL}
    depends_on:
      - backend

volumes:
  backend_data: 
