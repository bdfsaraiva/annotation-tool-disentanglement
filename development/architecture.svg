<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="900" height="580" viewBox="0 0 900 580" font-family="Helvetica, Arial, sans-serif">

  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#475569" />
    </marker>
  </defs>

  <!-- Background -->
  <rect width="900" height="580" fill="#f8fafc" rx="6" ry="6" />

  <!-- Title -->
  <text x="450" y="36" text-anchor="middle" font-size="20" font-weight="bold" fill="#1e293b">LACE System Architecture</text>

  <!-- ═══════════════════════════════════════════ -->
  <!-- FRONTEND LAYER                              -->
  <!-- ═══════════════════════════════════════════ -->
  <rect x="20" y="54" width="860" height="148" rx="8" ry="8" fill="#dbeafe" stroke="#3b82f6" stroke-width="1.8" />
  <text x="40" y="76" font-size="13" font-weight="bold" fill="#1e40af">FRONTEND</text>
  <text x="40" y="91" font-size="10" fill="#3b82f6">React 18 · Vite · TanStack Query</text>
  <line x1="20" y1="97" x2="880" y2="97" stroke="#3b82f6" stroke-width="1" />

  <!-- Frontend Box 1: Admin Dashboard -->
  <rect x="36" y="106" width="186" height="84" rx="5" ry="5" fill="#eff6ff" stroke="#93c5fd" stroke-width="1.2" />
  <text x="129" y="122" text-anchor="middle" font-size="11" font-weight="bold" fill="#1d4ed8">Admin Dashboard</text>
  <line x1="36" y1="126" x2="222" y2="126" stroke="#93c5fd" stroke-width="0.8" />
  <text x="46" y="140" font-size="9.5" fill="#1e40af">• Project &amp; user CRUD</text>
  <text x="46" y="153" font-size="9.5" fill="#1e40af">• CSV import with preview</text>
  <text x="46" y="166" font-size="9.5" fill="#1e40af">• JSON / ZIP export</text>
  <text x="46" y="179" font-size="9.5" fill="#1e40af">• IAA pairwise matrix view</text>

  <!-- Frontend Box 2: Annotation Interface -->
  <rect x="238" y="106" width="186" height="84" rx="5" ry="5" fill="#eff6ff" stroke="#93c5fd" stroke-width="1.2" />
  <text x="331" y="122" text-anchor="middle" font-size="11" font-weight="bold" fill="#1d4ed8">Annotation Interface</text>
  <line x1="238" y1="126" x2="424" y2="126" stroke="#93c5fd" stroke-width="0.8" />
  <text x="248" y="140" font-size="9.5" fill="#1e40af">• Disentanglement workspace</text>
  <text x="248" y="153" font-size="9.5" fill="#1e40af">• Adjacency pair editor</text>
  <text x="248" y="166" font-size="9.5" fill="#1e40af">• Turn-linking &amp; thread view</text>
  <text x="248" y="179" font-size="9.5" fill="#1e40af">• Progress indicators</text>

  <!-- Frontend Box 3: Auth Context -->
  <rect x="440" y="106" width="186" height="84" rx="5" ry="5" fill="#eff6ff" stroke="#93c5fd" stroke-width="1.2" />
  <text x="533" y="122" text-anchor="middle" font-size="11" font-weight="bold" fill="#1d4ed8">Auth Context</text>
  <line x1="440" y1="126" x2="626" y2="126" stroke="#93c5fd" stroke-width="0.8" />
  <text x="450" y="140" font-size="9.5" fill="#1e40af">• JWT access + refresh tokens</text>
  <text x="450" y="153" font-size="9.5" fill="#1e40af">• Role-based route guards</text>
  <text x="450" y="166" font-size="9.5" fill="#1e40af">• Automatic token refresh</text>
  <text x="450" y="179" font-size="9.5" fill="#1e40af">• Session persistence</text>

  <!-- Frontend Box 4: State & API Layer -->
  <rect x="642" y="106" width="222" height="84" rx="5" ry="5" fill="#eff6ff" stroke="#93c5fd" stroke-width="1.2" />
  <text x="753" y="122" text-anchor="middle" font-size="11" font-weight="bold" fill="#1d4ed8">State &amp; API Layer</text>
  <line x1="642" y1="126" x2="864" y2="126" stroke="#93c5fd" stroke-width="0.8" />
  <text x="652" y="140" font-size="9.5" fill="#1e40af">• TanStack Query cache</text>
  <text x="652" y="153" font-size="9.5" fill="#1e40af">• Axios interceptors</text>
  <text x="652" y="166" font-size="9.5" fill="#1e40af">• Optimistic updates</text>
  <text x="652" y="179" font-size="9.5" fill="#1e40af">• Error boundary handling</text>

  <!-- ═══════════════════════════════════════════ -->
  <!-- ARROW: Frontend → Backend                  -->
  <!-- ═══════════════════════════════════════════ -->
  <line x1="450" y1="202" x2="450" y2="236" stroke="#475569" stroke-width="1.8" marker-end="url(#arrowhead)" />
  <rect x="340" y="210" width="220" height="20" rx="4" ry="4" fill="#f1f5f9" stroke="#cbd5e1" stroke-width="1" />
  <text x="450" y="224" text-anchor="middle" font-size="10" fill="#475569">HTTP / REST (JSON)</text>

  <!-- ═══════════════════════════════════════════ -->
  <!-- BACKEND LAYER                              -->
  <!-- ═══════════════════════════════════════════ -->
  <rect x="20" y="240" width="860" height="148" rx="8" ry="8" fill="#dcfce7" stroke="#16a34a" stroke-width="1.8" />
  <text x="40" y="262" font-size="13" font-weight="bold" fill="#14532d">BACKEND</text>
  <text x="40" y="277" font-size="10" fill="#16a34a">FastAPI · Uvicorn · SQLAlchemy 2 · Alembic · Pydantic v2 · bcrypt · scipy</text>
  <line x1="20" y1="283" x2="880" y2="283" stroke="#16a34a" stroke-width="1" />

  <!-- Backend Box 1: Auth Router -->
  <rect x="36" y="292" width="148" height="84" rx="5" ry="5" fill="#f0fdf4" stroke="#86efac" stroke-width="1.2" />
  <text x="110" y="308" text-anchor="middle" font-size="11" font-weight="bold" fill="#15803d">Auth Router</text>
  <line x1="36" y1="312" x2="184" y2="312" stroke="#86efac" stroke-width="0.8" />
  <text x="46" y="326" font-size="9.5" fill="#14532d">• Login / logout</text>
  <text x="46" y="339" font-size="9.5" fill="#14532d">• Token issuance</text>
  <text x="46" y="352" font-size="9.5" fill="#14532d">• Refresh endpoint</text>
  <text x="46" y="365" font-size="9.5" fill="#14532d">• Rate limiting</text>

  <!-- Backend Box 2: Admin Router -->
  <rect x="196" y="292" width="148" height="84" rx="5" ry="5" fill="#f0fdf4" stroke="#86efac" stroke-width="1.2" />
  <text x="270" y="308" text-anchor="middle" font-size="11" font-weight="bold" fill="#15803d">Admin Router</text>
  <line x1="196" y1="312" x2="344" y2="312" stroke="#86efac" stroke-width="0.8" />
  <text x="206" y="326" font-size="9.5" fill="#14532d">• User management</text>
  <text x="206" y="339" font-size="9.5" fill="#14532d">• Project CRUD</text>
  <text x="206" y="352" font-size="9.5" fill="#14532d">• CSV import pipeline</text>
  <text x="206" y="365" font-size="9.5" fill="#14532d">• Export endpoints</text>

  <!-- Backend Box 3: Annotation Router -->
  <rect x="356" y="292" width="168" height="84" rx="5" ry="5" fill="#f0fdf4" stroke="#86efac" stroke-width="1.2" />
  <text x="440" y="308" text-anchor="middle" font-size="11" font-weight="bold" fill="#15803d">Annotation Router</text>
  <line x1="356" y1="312" x2="524" y2="312" stroke="#86efac" stroke-width="0.8" />
  <text x="366" y="326" font-size="9.5" fill="#14532d">• Disentanglement CRUD</text>
  <text x="366" y="339" font-size="9.5" fill="#14532d">• Adjacency pair CRUD</text>
  <text x="366" y="352" font-size="9.5" fill="#14532d">• Completion tracking</text>
  <text x="366" y="365" font-size="9.5" fill="#14532d">• Batch import/export</text>

  <!-- Backend Box 4: IAA Engine -->
  <rect x="536" y="292" width="148" height="84" rx="5" ry="5" fill="#f0fdf4" stroke="#86efac" stroke-width="1.2" />
  <text x="610" y="308" text-anchor="middle" font-size="11" font-weight="bold" fill="#15803d">IAA Engine</text>
  <line x1="536" y1="312" x2="684" y2="312" stroke="#86efac" stroke-width="0.8" />
  <text x="546" y="326" font-size="9.5" fill="#14532d">• Hungarian alignment</text>
  <text x="546" y="339" font-size="9.5" fill="#14532d">• Pairwise matrices</text>
  <text x="546" y="352" font-size="9.5" fill="#14532d">• scipy / numpy</text>
  <text x="546" y="365" font-size="9.5" fill="#14532d">• F1 / κ metrics</text>

  <!-- Backend Box 5: ORM / Schemas -->
  <rect x="696" y="292" width="168" height="84" rx="5" ry="5" fill="#f0fdf4" stroke="#86efac" stroke-width="1.2" />
  <text x="780" y="308" text-anchor="middle" font-size="11" font-weight="bold" fill="#15803d">ORM / Schemas</text>
  <line x1="696" y1="312" x2="864" y2="312" stroke="#86efac" stroke-width="0.8" />
  <text x="706" y="326" font-size="9.5" fill="#14532d">• SQLAlchemy models</text>
  <text x="706" y="339" font-size="9.5" fill="#14532d">• Pydantic schemas</text>
  <text x="706" y="352" font-size="9.5" fill="#14532d">• Alembic migrations</text>
  <text x="706" y="365" font-size="9.5" fill="#14532d">• CRUD helpers</text>

  <!-- ═══════════════════════════════════════════ -->
  <!-- ARROW: Backend → Data Layer                -->
  <!-- ═══════════════════════════════════════════ -->
  <line x1="450" y1="388" x2="450" y2="422" stroke="#475569" stroke-width="1.8" marker-end="url(#arrowhead)" />
  <rect x="400" y="396" width="100" height="20" rx="4" ry="4" fill="#f1f5f9" stroke="#cbd5e1" stroke-width="1" />
  <text x="450" y="410" text-anchor="middle" font-size="10" fill="#475569">SQL</text>

  <!-- ═══════════════════════════════════════════ -->
  <!-- DATA LAYER                                  -->
  <!-- ═══════════════════════════════════════════ -->
  <rect x="20" y="426" width="860" height="138" rx="8" ry="8" fill="#fef9c3" stroke="#ca8a04" stroke-width="1.8" />
  <text x="40" y="448" font-size="13" font-weight="bold" fill="#713f12">DATA LAYER</text>
  <text x="40" y="463" font-size="10" fill="#ca8a04">SQLite (default) · PostgreSQL (production) · Alembic migrations</text>
  <line x1="20" y1="469" x2="880" y2="469" stroke="#ca8a04" stroke-width="1" />

  <!-- Data Box 1: users -->
  <rect x="36" y="478" width="142" height="74" rx="5" ry="5" fill="#fefce8" stroke="#fde68a" stroke-width="1.2" />
  <text x="107" y="494" text-anchor="middle" font-size="11" font-weight="bold" fill="#92400e">users</text>
  <line x1="36" y1="498" x2="178" y2="498" stroke="#fde68a" stroke-width="0.8" />
  <text x="46" y="512" font-size="9.5" fill="#713f12">• id, username, email</text>
  <text x="46" y="525" font-size="9.5" fill="#713f12">• hashed_password</text>
  <text x="46" y="538" font-size="9.5" fill="#713f12">• role (admin/annotator)</text>

  <!-- Data Box 2: projects -->
  <rect x="192" y="478" width="142" height="74" rx="5" ry="5" fill="#fefce8" stroke="#fde68a" stroke-width="1.2" />
  <text x="263" y="494" text-anchor="middle" font-size="11" font-weight="bold" fill="#92400e">projects</text>
  <line x1="192" y1="498" x2="334" y2="498" stroke="#fde68a" stroke-width="0.8" />
  <text x="202" y="512" font-size="9.5" fill="#713f12">• id, name, description</text>
  <text x="202" y="525" font-size="9.5" fill="#713f12">• annotation_type</text>
  <text x="202" y="538" font-size="9.5" fill="#713f12">• project_assignments</text>

  <!-- Data Box 3: chat_rooms / messages -->
  <rect x="348" y="478" width="204" height="74" rx="5" ry="5" fill="#fefce8" stroke="#fde68a" stroke-width="1.2" />
  <text x="450" y="494" text-anchor="middle" font-size="11" font-weight="bold" fill="#92400e">chat_rooms / messages</text>
  <line x1="348" y1="498" x2="552" y2="498" stroke="#fde68a" stroke-width="0.8" />
  <text x="358" y="512" font-size="9.5" fill="#713f12">• room: id, name, project_id</text>
  <text x="358" y="525" font-size="9.5" fill="#713f12">• message: id, author, text</text>
  <text x="358" y="538" font-size="9.5" fill="#713f12">• timestamp, sequence_num</text>

  <!-- Data Box 4: annotations -->
  <rect x="566" y="478" width="142" height="74" rx="5" ry="5" fill="#fefce8" stroke="#fde68a" stroke-width="1.2" />
  <text x="637" y="494" text-anchor="middle" font-size="11" font-weight="bold" fill="#92400e">annotations</text>
  <line x1="566" y1="498" x2="708" y2="498" stroke="#fde68a" stroke-width="0.8" />
  <text x="576" y="512" font-size="9.5" fill="#713f12">• id, user_id, room_id</text>
  <text x="576" y="525" font-size="9.5" fill="#713f12">• message_id, thread_id</text>
  <text x="576" y="538" font-size="9.5" fill="#713f12">• chat_room_completions</text>

  <!-- Data Box 5: adjacency_pairs -->
  <rect x="722" y="478" width="142" height="74" rx="5" ry="5" fill="#fefce8" stroke="#fde68a" stroke-width="1.2" />
  <text x="793" y="494" text-anchor="middle" font-size="11" font-weight="bold" fill="#92400e">adjacency_pairs</text>
  <line x1="722" y1="498" x2="864" y2="498" stroke="#fde68a" stroke-width="0.8" />
  <text x="732" y="512" font-size="9.5" fill="#713f12">• id, user_id, room_id</text>
  <text x="732" y="525" font-size="9.5" fill="#713f12">• source_msg, target_msg</text>
  <text x="732" y="538" font-size="9.5" fill="#713f12">• pair_type label</text>

</svg>
